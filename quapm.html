<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QPM MC-Trainer</title>
<style>
:root{--bg:#0e1524;--card:#16203a;--fg:#e8eef7;--mut:#8ea3c4;--line:#26324f;--ok:#2ecc71;--no:#e74c3c;--acc:#4c8bf5;--warn:#e0a800;}
*{box-sizing:border-box}html,body{margin:0;min-height:100%}
body{background:var(--bg);color:var(--fg);font-family:'Segoe UI',system-ui,Arial,sans-serif;
 display:flex;flex-direction:column;align-items:center;padding:14px;line-height:1.5}
.wrap{width:100%;max-width:660px}
header{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
h1{font-size:14px;margin:0;color:var(--mut);font-weight:600;letter-spacing:.5px}
.prog{font-size:12px;color:var(--mut)}
.bar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin:6px 0 10px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--ok));width:0;transition:width .4s}
.ctl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.chip{background:#1b2942;border:1px solid var(--line);color:var(--mut);border-radius:20px;padding:4px 11px;
 font-size:12px;cursor:pointer;user-select:none}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.chip.gear{margin-left:auto}
.panel{background:#131d33;border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-bottom:12px;font-size:12.5px;display:none}
.panel.show{display:block}
.panel label{display:flex;align-items:center;gap:9px;margin:7px 0}
.panel input[type=range]{flex:1}
.panel .v{width:24px;text-align:right;color:var(--acc);font-weight:700}
.topics{display:grid;grid-template-columns:1fr auto;gap:2px 10px;max-height:210px;overflow:auto}
.topics .t{color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topics .n{font-variant-numeric:tabular-nums}
.topics .done{color:var(--ok)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:19px 18px;min-height:160px}
.meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mut);margin-bottom:11px;gap:8px}
.dots span{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--line);margin-left:4px}
.dots span.on{background:var(--ok)}
.tag{background:#20304f;padding:2px 8px;border-radius:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q{font-size:17px;font-weight:600;margin:4px 0 15px}
.opts{display:flex;flex-direction:column;gap:9px}
button.opt{display:flex;gap:10px;align-items:flex-start;text-align:left;background:#1b2942;color:var(--fg);
 border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:15px;cursor:pointer;transition:.12s;font-family:inherit}
button.opt:hover{border-color:var(--acc);background:#213256}
button.opt.sel{border-color:var(--acc);background:#22375e;box-shadow:0 0 0 1px var(--acc) inset}
button.opt:disabled{cursor:default;opacity:.5}
button.opt .k{color:var(--mut);font-size:11px;border:1px solid var(--line);border-radius:4px;
 padding:0 5px;line-height:17px;flex:none;margin-top:2px}
.confirm{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;display:none}
.confirm.show{display:block}
.confirm .hint{font-size:11.5px;color:var(--mut);margin-bottom:8px}
.cbtns{display:flex;gap:9px}
.cbtn{flex:1;border-radius:9px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid;font-family:inherit}
.cbtn.sure{background:#14351f;border-color:var(--ok);color:#8ef0b0}
.cbtn.sure:hover{background:#1a4a2a}
.cbtn.guess{background:#3a2f0c;border-color:var(--warn);color:#f0d27a}
.cbtn.guess:hover{background:#4d3d0f}
.flash{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
 font-size:110px;font-weight:800;pointer-events:none;z-index:9}
.flash.ok{display:flex;color:var(--ok)}.flash.no{display:flex;color:var(--no)}.flash.gu{display:flex;color:var(--warn)}
.flash small{font-size:15px;font-weight:600;letter-spacing:.5px}
footer{margin-top:12px;font-size:11px;color:var(--mut);display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between}
footer a{color:var(--mut);cursor:pointer;text-decoration:underline dotted}
.err{background:#3a1720;border:1px solid var(--no);color:#ffb4bd;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none}
.done{text-align:center;padding:26px 10px}.done .big{font-size:40px}
.tmr{height:4px;background:var(--line);border-radius:3px;overflow:hidden;margin:-8px 0 14px}
.tmr>i{display:block;height:100%;background:var(--acc);width:100%}
.tmr.warn>i{background:var(--no)}
.wn{width:100%;margin-top:10px;background:#241c33;border:1px solid #4b3a6b;color:#c3aee6;border-radius:9px;
 padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.wn:hover{background:#2e2342}.wn:disabled{opacity:.5;cursor:default}
button.opt .box{flex:none;width:15px;height:15px;border:1.5px solid var(--mut);border-radius:3px;margin-top:3px}
button.opt.sel .box{background:var(--acc);border-color:var(--acc);box-shadow:inset 0 0 0 2px var(--card)}
.multitag{background:#3a2f0c;color:#f0d27a;border:1px solid var(--warn);padding:1px 7px;border-radius:9px;font-size:10px;white-space:nowrap}
.negtag{background:#3a1720;color:#ffb4bd;border:1px solid var(--no);padding:1px 7px;border-radius:9px;font-size:10px;white-space:nowrap}
.rtag{background:#12303a;color:#8fd7ee;border:1px solid #2b7f9e;padding:1px 7px;border-radius:9px;font-size:10px;white-space:nowrap}
.anlage{background:#111a2e;border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:6px;
 padding:10px 12px;margin:0 0 13px;font-size:13px;color:#cddaee;max-height:230px;overflow:auto}
.numin{display:flex;gap:8px;align-items:center}
.numin input{flex:1;background:#1b2942;border:1px solid var(--line);border-radius:9px;color:var(--fg);
 padding:12px 13px;font-size:18px;font-family:inherit}
.numin input.mono{font-family:Consolas,monospace;font-size:19px}
.numin input:focus{outline:none;border-color:var(--acc)}
.numin .unit{color:var(--mut);font-size:14px;min-width:34px}
.flash.wn2{display:flex;color:#a98fd6}
.small{font-size:11px;color:var(--mut)}
</style></head><body>
<div class="wrap">
 <header><h1>QPM · MC-TRAINER</h1><div class="prog" id="prog"></div></header>
 <div class="bar"><i id="barfill"></i></div>
 <div class="ctl">
   <span class="chip" data-teil="all">Alle</span>
   <span class="chip" data-teil="Q">Teil Q</span>
   <span class="chip" data-teil="P">Teil P</span>
   <span class="chip" data-mode="offen">offen</span>
   <span class="chip" data-mode="wackelig">wackelig</span>
   <span class="chip gear" id="btnTopics">Themen</span>
   <span class="chip" id="btnCfg">⚙</span>
 </div>
 <div class="panel" id="pCfg">
   <label>Mastery N (richtige in Folge) <input type="range" id="rN" min="3" max="8" step="1"><span class="v" id="vN"></span></label>
   <label>Cooldown K (Fragen dazwischen) <input type="range" id="rK" min="1" max="8" step="1"><span class="v" id="vK"></span></label>
   <label>Zeitlimit je Frage <input type="range" id="rT" min="0" max="60" step="5"><span class="v" id="vT"></span></label>
   <div class="small">Höheres N/K = brutaler. „Geraten“ zählt nie als Fortschritt. Zeitlimit 0 = aus; läuft die Zeit ab, gilt es als „Weiß nicht“.</div>
 </div>
 <div class="panel" id="pTopics"><div class="topics" id="topicList"></div></div>
 <div class="err" id="err"></div>
 <div class="card" id="card"></div>
 <footer>
   <span id="sess"></span>
   <span><a id="exp">sichern</a> · <a id="imp">laden</a> · <a id="reset">zurücksetzen</a></span>
 </footer>
</div>
<div class="flash" id="flash"></div>

// Compact pure-JS SHA-256 over UTF-8 string -> lowercase hex. No deps, works on file://.
function sha256(str){
  function rotr(n,x){return (x>>>n)|(x<<(32-n));}
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
  0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
  0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
  0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
  0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
  0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
  0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
  0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  // UTF-8 bytes
  const bytes=[];
  for(let i=0;i<str.length;i++){
    let c=str.charCodeAt(i);
    if(c<0x80) bytes.push(c);
    else if(c<0x800){ bytes.push(0xc0|(c>>6),0x80|(c&0x3f)); }
    else if(c>=0xd800&&c<0xdc00){ const c2=str.charCodeAt(++i); const cp=0x10000+((c&0x3ff)<<10)+(c2&0x3ff);
      bytes.push(0xf0|(cp>>18),0x80|((cp>>12)&0x3f),0x80|((cp>>6)&0x3f),0x80|(cp&0x3f)); }
    else { bytes.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f)); }
  }
  const l=bytes.length; bytes.push(0x80);
  while(bytes.length%64!==56) bytes.push(0);
  const bl=l*8;
  for(let i=7;i>=0;i--) bytes.push((bl/Math.pow(2,i*8))&0xff);
  const w=new Array(64);
  for(let j=0;j<bytes.length;j+=64){
    for(let i=0;i<16;i++) w[i]=(bytes[j+i*4]<<24)|(bytes[j+i*4+1]<<16)|(bytes[j+i*4+2]<<8)|(bytes[j+i*4+3]);
    for(let i=16;i<64;i++){
      const s0=rotr(7,w[i-15])^rotr(18,w[i-15])^(w[i-15]>>>3);
      const s1=rotr(17,w[i-2])^rotr(19,w[i-2])^(w[i-2]>>>10);
      w[i]=(w[i-16]+s0+w[i-7]+s1)|0;
    }
    let [a,b,c,d,e,f,g,h]=H;
    for(let i=0;i<64;i++){
      const S1=rotr(6,e)^rotr(11,e)^rotr(25,e);
      const ch=(e&f)^(~e&g);
      const t1=(h+S1+ch+K[i]+w[i])|0;
      const S0=rotr(2,a)^rotr(13,a)^rotr(22,a);
      const maj=(a&b)^(a&c)^(b&c);
      const t2=(S0+maj)|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
    }
    H=[(H[0]+a)|0,(H[1]+b)|0,(H[2]+c)|0,(H[3]+d)|0,(H[4]+e)|0,(H[5]+f)|0,(H[6]+g)|0,(H[7]+h)|0];
  }
  return H.map(x=>('00000000'+(x>>>0).toString(16)).slice(-8)).join('');
}

const styleKey=t=>(t.includes("(")?"1":"0")+(/[—→·]/.test(t)?"1":"0");

function pairsOf(a){const o=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)o.push([a[i],a[j]]);return o;}
/* 1 Ziel + 2 Gegenstuecke so waehlen, dass WEDER Laenge NOCH Stil die Zielantwort verraten.
   Der Laengen-Rang der Zielantwort wird bewusst GEWUERFELT -> reines Rauschen. */
function pick1of3(targets, others){
  const want=Math.floor(Math.random()*3);            // 0=kuerzeste, 1=mitte, 2=laengste
  const cm=[];
  for(const c of targets) for(const pr of pairsOf(others)){
    const d1=pr[0], d2=pr[1];
    const L=[c.length,d1.length,d2.length].sort(function(a,b){return a-b;});
    const rank = c.length<=L[0] ? 0 : (c.length>=L[2] ? 2 : 1);
    const st=(styleKey(c)!==styleKey(d1))+(styleKey(c)!==styleKey(d2));
    cm.push({c:c,ds:[d1,d2],score:(rank!==want?1000:0)+(L[2]-L[0])+st*25});
  }
  cm.sort(function(a,b){return a.score-b.score;});
  const good=cm.filter(function(x){return x.score<1000;});
  const pool=good.length?good.slice(0,Math.max(3,Math.ceil(good.length*0.3))):cm.slice(0,3);
  const p=rand(pool); return shuffle([p.c].concat(p.ds));
}
function buildOptions(q){

    const k=2+Math.floor(Math.random()*2);
    const cs=sample(q._c,Math.min(k,q._c.length));
    return shuffle(cs.concat(sample(q._d,5-cs.length)));

}

function pickQ(){
  S.tick++;
  const un=pool(); if(!un.length) return null;
  let el=un.filter(q=>(S.tick-st(q.id).last)>=S.cfg.K);
  if(!el.length) el=un.slice().sort((a,b)=>st(a.id).last-st(b.id).last).slice(0,1);
  const w=el.map(q=>{const s=st(q.id); return (isShaky(q))?3:(s.seen>0?2:1.5);});
  let r=Math.random()*w.reduce((a,b)=>a+b,0);
  for(let i=0;i<el.length;i++){ r-=w[i]; if(r<=0) return el[i]; }
  return el[el.length-1];
}

  if(!cur){
    card.innerHTML=`<div class="done"><div class="big">🎉</div>${S.mode==="wackelig"?"Keine Wackelkandidaten":"Alle "+tot+" Fragen gemeistert"}!
      <div class="small" style="margin-top:6px">(${S.cfg.N} richtige in Folge je Frage — ohne Raten)</div></div>`;
    save(); return;
  }
  const s=st(cur.id);
  cur._neg = !!(cur.m && cur.neg && cur.neg.length && Math.random()<0.40);
  kind = (cur.type==="num"||cur.type==="text") ? cur.type : "mc";
  curOpts = (kind==="mc") ? buildOptions(cur) : [];
  let dots=''; for(let i=0;i<S.cfg.N;i++) dots+=`<span class="${i<s.streak?'on':''}"></span>`;
  const badge = kind==="num" ? '<span class="rtag">Rechenaufgabe · Zahl eingeben</span>'
              : kind==="text" ? '<span class="rtag">Abkürzung ausschreiben</span>'
              : cur._neg ? '<span class="negtag">Negativfrage · die FALSCHE Aussage suchen</span>'
              : cur.m ? '<span class="multitag">Mehrfachauswahl · Anzahl unbekannt</span>' : '';
  const stem = cur._neg ? rand(cur.neg) : rand(cur.stems);
  let body;
  if(kind==="num"){
    body = '<div class="numin"><input id="numIn" class="mono" inputmode="decimal" autocomplete="off" placeholder="Zahl eingeben…"><span class="unit">'+(cur.unit||'')+'</span></div>'
         + '<div class="small" style="margin-top:6px">'+(cur.dec>0?('auf '+cur.dec+' Nachkommastelle'+(cur.dec>1?'n':'')+' genau · Komma oder Punkt'):'ganze Zahl')+' · keine Teilpunkte</div>';
  } else if(kind==="text"){
    body = '<div class="numin"><input id="numIn" autocomplete="off" spellcheck="false" placeholder="ausgeschrieben eingeben…"></div>'
         + '<div class="small" style="margin-top:6px">Groß-/Kleinschreibung, Bindestriche und Leerzeichen egal — der Begriff muss vollständig sein.</div>';
  } else {
    body = '<div class="opts">'+curOpts.map(function(o,i){
      return '<button class="opt" data-i="'+i+'"><span class="k">'+(i+1)+'</span>'+((cur.m&&!cur._neg)?'<span class="box"></span>':'')+'<span>'+o+'</span></button>';}).join('')+'</div>';
  }
  card.innerHTML=`<div class="meta"><span class="tag">Teil ${cur.teil} · ${cur.topic}</span>
    ${badge}
    <span class="dots" title="${s.streak}/${S.cfg.N} in Folge">${dots}</span></div>
    ${cur.text?`<div class="anlage">${cur.text}</div>`:''}
    <div class="q">${stem}</div>
    <div class="tmr" id="tmr" style="display:none"><i id="tmrf"></i></div>
    ${body}
    <button class="wn" id="bWN">Weiß nicht &nbsp;<span class="small">(W)</span></button>
    <div class="confirm" id="conf"><div class="hint">${kind!=="mc"?"Eingabe gemacht — wie sicher bist du?":((cur.m&&!cur._neg)?"Auswahl vollständig? Keine Teilpunkte — die Menge muss exakt stimmen.":"Antwort gewählt — wie sicher bist du?")}</div>
      <div class="cbtns">
        <button class="cbtn sure"  id="bSure">Sicher &nbsp;<span class="small">(Enter)</span></button>
        <button class="cbtn guess" id="bGuess">Geraten &nbsp;<span class="small">(G)</span></button>
      </div></div>`;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>select(+b.dataset.i));
  const ni0=document.getElementById("numIn");
  if(ni0){ ni0.focus(); ni0.oninput=function(){ stopTimer(); document.getElementById("conf").classList.toggle("show", ni0.value.trim()!==""); }; }
  document.getElementById("bSure").onclick=()=>commit(true);
  document.getElementById("bGuess").onclick=()=>commit(false);
  document.getElementById("bWN").onclick=()=>unknown(false);
  startTimer();
}

/* ---- Zeitlimit ---- */
let tId=null;
function stopTimer(){ if(tId){clearInterval(tId);tId=null;} }
function startTimer(){
  stopTimer();
  const el=document.getElementById("tmr"); if(!el) return;
  const lim = (cur && (cur.type==="num"||cur.type==="text")) ? (cur.t||180) : S.cfg.T;
  if(!lim){ el.style.display="none"; return; }
  const fl=document.getElementById("tmrf");
  el.style.display="block"; el.classList.remove("warn"); fl.style.width="100%";
  let left=lim*1000; const total=left;
  tId=setInterval(()=>{
    left-=200; const pct=Math.max(0,left/total*100);
    fl.style.width=pct+"%";
    if(pct<=25) el.classList.add("warn");
    if(left<=0){ stopTimer(); unknown(true); }
  },200);
}
/* ---- „Weiß nicht“ / Zeit abgelaufen: kein Kredit, Serie zurück ---- */
function unknown(byTime){
  if(locked||!cur) return;
  locked=true; stopTimer();
  const s=st(cur.id); s.seen++; s.last=S.tick; s.streak=0; s.mastered=false; s.shaky=true;
  sess.a++; sess.w++; save();
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const w=document.getElementById("bWN"); if(w) w.disabled=true;
  document.getElementById("conf").classList.remove("show");
  const f=document.getElementById("flash");
  f.className='flash wn2';
  f.innerHTML='?<small>'+(byTime?'ZEIT ABGELAUFEN':'WEISS NICHT')+' — Serie zurückgesetzt</small>';
  setTimeout(()=>{f.className='flash';},780);
  cur=null; setTimeout(draw,880);
}
function select(i){
  if(locked||!cur||i>=curOpts.length) return;
  stopTimer();                 // Recall ist vorbei — die Sicher/Geraten-Frage ist untimed
  if(cur.m && !cur._neg){
    if(selSet.has(i)) selSet.delete(i); else selSet.add(i);
    document.querySelectorAll('.opt').forEach(b=>b.classList.toggle('sel',selSet.has(+b.dataset.i)));
    document.getElementById("conf").classList.toggle("show",selSet.size>0);
  } else {
    sel=i;
    document.querySelectorAll('.opt').forEach(b=>b.classList.toggle('sel',+b.dataset.i===i));
    document.getElementById("conf").classList.add("show");
  }
}
function commit(sure){
  if(locked||!cur) return;
  const ni=document.getElementById("numIn");
  if(kind!=="mc" ? !(ni&&ni.value.trim()) : ((cur.m&&!cur._neg) ? selSet.size===0 : sel===null)) return;
  locked=true; stopTimer();
  let ok;
  if(kind==="num"){
    const v=parseFloat(ni.value.trim().replace(/\s/g,"").replace(",","."));
    ok = isFinite(v) && cur._set.has(sha256(SALT+v.toFixed(cur.dec)));
  } else if(kind==="text"){
    ok = cur._set.has(sha256(SALT+normText(ni.value)));
  } else if(cur._neg){
    ok = !cur._set.has(sha256(SALT+curOpts[sel]));    // gesucht war die FALSCHE Aussage
  } else if(cur.m){
    const shown=curOpts.map((o,i)=>i).filter(i=>cur._set.has(sha256(SALT+curOpts[i])));
    ok = shown.length===selSet.size && shown.every(i=>selSet.has(i));   // keine Teilpunkte
  } else {
    ok = cur._set.has(sha256(SALT+curOpts[sel]));
  }
  const s=st(cur.id); s.seen++; s.last=S.tick; sess.a++;
  if(ok) sess.r++;
  if(!sure) sess.g++;
  if(sure){
    if(ok){ s.streak++; s.shaky=false; if(s.streak>=S.cfg.N) s.mastered=true; }
    else  { s.streak=0; s.mastered=false; s.shaky=false; }
  } else {                       // GERATEN
    s.shaky=true;                // kommt bevorzugt wieder (wackelig)
    if(!ok){ s.streak=0; s.mastered=false; }
    /* geraten + richtig => KEIN Fortschritt (Glück zählt nicht) */
  }
  save();
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(ni) ni.disabled=true;
  document.getElementById("conf").classList.remove("show");
  flash(ok,sure); cur=null;
  setTimeout(draw, ok&&sure?560:760);
}
function flash(ok,sure){
  const f=document.getElementById("flash");
  if(!sure&&ok){ f.className='flash gu'; f.innerHTML='✓<small>GERATEN — kein Fortschritt</small>'; }
  else if(ok){ f.className='flash ok'; f.innerHTML='✓'; }
  else { f.className='flash no'; f.innerHTML='✗'; }
  setTimeout(()=>{f.className='flash';}, ok&&sure?430:640);
}
function drawTopics(){
  const by={};
  scope().forEach(q=>{const k=q.teil+" · "+q.topic;(by[k]=by[k]||[0,0]);by[k][1]++;if(isMast(q))by[k][0]++;});
  document.getElementById("topicList").innerHTML=Object.keys(by).sort().map(k=>{
    const [m,t]=by[k]; return `<div class="t ${m===t?'done':''}">${k}</div><div class="n ${m===t?'done':''}">${m}/${t}</div>`;}).join('');
}
/* ---- controls ---- */
document.querySelectorAll('.chip[data-teil]').forEach(c=>c.onclick=()=>{S.filter=c.dataset.teil;save();draw();});
document.querySelectorAll('.chip[data-mode]').forEach(c=>c.onclick=()=>{S.mode=(S.mode===c.dataset.mode)?"alle":c.dataset.mode;save();draw();});
document.getElementById("btnCfg").onclick=()=>document.getElementById("pCfg").classList.toggle("show");
document.getElementById("btnTopics").onclick=()=>{const p=document.getElementById("pTopics");p.classList.toggle("show");if(p.classList.contains("show"))drawTopics();};
const rN=document.getElementById("rN"), rK=document.getElementById("rK"), rT=document.getElementById("rT");
function syncCfg(){rN.value=S.cfg.N;rK.value=S.cfg.K;rT.value=S.cfg.T;document.getElementById("vN").textContent=S.cfg.N;document.getElementById("vK").textContent=S.cfg.K;document.getElementById("vT").textContent=S.cfg.T?S.cfg.T+"s":"aus";}
rN.oninput=()=>{S.cfg.N=+rN.value;syncCfg();save();draw();};
rK.oninput=()=>{S.cfg.K=+rK.value;syncCfg();save();draw();};
rT.oninput=()=>{S.cfg.T=+rT.value;syncCfg();save();stopTimer();startTimer();};
document.addEventListener('keydown',e=>{
  if(kind==="mc" && ['1','2','3','4','5'].includes(e.key)){ select(+e.key-1); e.preventDefault(); return; }
  if(e.key==='Escape'||(kind==="mc"&&(e.key==='w'||e.key==='W'))){ unknown(false); e.preventDefault(); return; }
  if(locked) return;
  if(kind!=="mc"){ if(e.key==="Enter"){ const ni=document.getElementById("numIn"); if(ni&&ni.value.trim()) commit(true); } return; }
  if((cur&&cur.m&&!cur._neg) ? selSet.size===0 : sel===null) return;
  if(e.key==='Enter'){ commit(true); e.preventDefault(); }
  if(e.key==='g'||e.key==='G'||e.key===' '){ commit(false); e.preventDefault(); }
});
document.getElementById("exp").onclick=()=>{
  const b=new Blob([JSON.stringify(S)],{type:"application/json"}), a=document.createElement("a");
  a.href=URL.createObjectURL(b); a.download="mctrainer_fortschritt.json"; a.click();
};
document.getElementById("imp").onclick=()=>{
  const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json";
  inp.onchange=()=>{const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const o=JSON.parse(r.result); if(o&&o.q){ S=o; S.cfg=S.cfg||{N:DEF.N,K:DEF.K}; S.filter=S.filter||"all"; S.mode=S.mode||"alle"; save(); syncCfg(); draw(); } }catch(e){ alert("Datei unlesbar."); } };
    r.readAsText(f); };
  inp.click();
};
document.getElementById("reset").onclick=()=>{
  if(prompt("Fortschritt WIRKLICH löschen? Tippe LÖSCHEN:")==="LÖSCHEN"){
    localStorage.removeItem(KEY); S={tick:0,q:{},cfg:{N:DEF.N,K:DEF.K,T:0},filter:"all",mode:"alle"}; sess={a:0,r:0,g:0,w:0}; syncCfg(); draw(); }
};
syncCfg(); draw();
</script></body></html>
